<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  Content Security Policy: defense in depth (same posture as the math tutor).
  * default-src none  : nothing loads unless explicitly allowed.
  * script-src sha256 : ONLY this app's own inline code (pinned by hash) runs.
                        Bundled chess.js is part of that one hashed script.
  * connect-src none  : no network of any kind — nothing is sent anywhere.
  * img/font/object none : no external or data resources.
  The computer opponent is pure JavaScript (no WASM/Stockfish), so nothing here
  needs the policy loosened.
-->

<meta name="referrer" content="no-referrer" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Chess Tutor</title>
<style>
  :root{
    --bg: var(--sn-stylekit-background-color, #f6f8fc);
    --fg: var(--sn-stylekit-foreground-color, #1f2937);
    --panel: var(--sn-stylekit-contrast-background-color, #ffffff);
    --border: var(--sn-stylekit-border-color, #e3e8ef);
    --muted: var(--sn-stylekit-neutral-color, #64748b);
    --font: var(--sn-stylekit-editor-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif);
    --accent:#3b6fd4; --accent2:#7c5cff; --good:#16a34a; --good-bg:#dcfce7;
    --warn:#d97706; --gold:#f59e0b; --shadow:0 2px 0 rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.4;-webkit-text-size-adjust:100%}
  #root{max-width:640px;margin:0 auto;padding:14px 14px 28px}

  .hero{text-align:center;padding:6px 0 10px}
  .hero-title{font-size:1.4rem;font-weight:800}

  /* rank / xp */
  .rankrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:12px;margin-bottom:14px}
  .rankbadge{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:12px}
  .rankinfo{flex:1}
  .rankname{font-weight:800}
  .xpbar{height:10px;background:var(--border);border-radius:999px;overflow:hidden;margin:5px 0}
  .xpfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}
  .xpmeta{font-size:.78rem;color:var(--muted)}

  /* home menu */
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mtile{display:flex;flex-direction:column;align-items:flex-start;gap:2px;border:2px solid var(--border);background:var(--panel);
    color:var(--fg);border-radius:18px;padding:16px 14px;cursor:pointer;box-shadow:var(--shadow);text-align:left}
  .mtile:active{transform:translateY(2px)}
  .mtile .ti{font-size:1.8rem}
  .mtile .tl{font-weight:800;font-size:1.05rem}
  .mtile .ts{font-size:.76rem;color:var(--muted)}
  .mtile.play{grid-column:1/3}
  .mtile.daily.done{border-color:var(--good);background:var(--good-bg)}
  .rowbtn{display:block;width:100%;margin-top:12px;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    border-radius:14px;padding:13px;font-weight:800;cursor:pointer;font-size:.95rem}
  .rowbtn:active{transform:translateY(1px)}
  .note{margin:16px 6px 0;font-size:.82rem;color:var(--muted);text-align:center}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .back{border:2px solid var(--border);background:var(--panel);color:var(--fg);border-radius:12px;padding:8px 12px;font-weight:800;cursor:pointer;font-size:.9rem}
  .tbtitle{font-weight:800;font-size:1.05rem;text-align:center}
  .tbsp{width:54px}

  /* lists (lessons + puzzles) */
  .llist{display:flex;flex-direction:column;gap:10px}
  .lcard{display:flex;align-items:center;gap:12px;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    border-radius:16px;padding:12px 14px;cursor:pointer;box-shadow:var(--shadow);text-align:left}
  .lcard:active{transform:translateY(2px)}
  .lemoji{font-size:1.7rem}
  .ltext{display:flex;flex-direction:column;flex:1}
  .ltitle{font-weight:800}
  .lsub{font-size:.78rem;color:var(--muted)}
  .lgo{font-size:1.5rem;color:var(--muted);font-weight:800}
  .badge.ok{color:var(--good);font-size:.85rem}

  /* board */
  .boardwrap{max-width:380px;margin:10px auto}
  .board{display:block;width:100%;height:auto;border-radius:12px}

  /* lesson */
  .sdots{display:flex;gap:6px;justify-content:center;margin:2px 0 10px}
  .sdot{width:8px;height:8px;border-radius:50%;background:var(--border)}
  .sdot.on{background:var(--accent2)}.sdot.past{background:var(--good)}
  .lesstext{font-size:1.08rem;line-height:1.5;text-align:center;padding:0 4px;margin-bottom:8px}
  .taskbar{margin:6px auto;max-width:380px;text-align:center;font-weight:800;color:var(--accent2);background:var(--panel);border:2px solid var(--accent2);border-radius:12px;padding:8px}
  .taskbar.ok{color:var(--good);border-color:var(--good)}
  .lessnav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
  .lnav{border:2px solid var(--accent);background:var(--panel);color:var(--accent);font-weight:800;border-radius:14px;padding:12px 20px;cursor:pointer;font-size:1.02rem}
  .lnav.next,.lnav.done{background:var(--accent);color:#fff}.lnav.done{background:var(--good);border-color:var(--good)}
  .lnav:disabled{opacity:.4;cursor:default}

  /* puzzle + game shared */
  .prompt{text-align:center;font-weight:800;color:var(--accent);background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:10px;margin-bottom:4px}
  .result{text-align:center;font-weight:800;border-radius:12px;padding:12px;margin-bottom:4px}
  .result.win{background:var(--good-bg);color:var(--good);border:2px solid var(--good)}
  .gstatus{text-align:center;font-weight:800;padding:8px;color:var(--fg)}
  .gstatus.over{color:var(--accent)}
  .msg{text-align:center;color:var(--warn);font-weight:700;margin:6px 0}
  .hintbox{max-width:420px;margin:8px auto;background:#fffbeb;border:2px solid #fcd34d;color:#92400e;border-radius:12px;padding:10px 12px;font-size:.95rem;text-align:center}
  .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .primary{border:none;background:var(--accent);color:#fff;font-weight:800;border-radius:14px;padding:13px 22px;cursor:pointer;font-size:1.02rem;box-shadow:var(--shadow)}
  .primary.big{display:block;width:100%;margin-top:16px}
  .primary:active{transform:translateY(2px)}
  .ghost{border:2px solid var(--border);background:var(--panel);color:var(--fg);font-weight:800;border-radius:14px;padding:11px 16px;cursor:pointer}
  .ghost:active{transform:translateY(1px)}

  /* setup + options */
  .sec{font-size:1rem;margin:16px 2px 8px}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{border:2px solid var(--border);background:var(--panel);color:var(--fg);font-weight:800;border-radius:12px;padding:11px 14px;cursor:pointer;min-width:44px}
  .opt.on{border-color:var(--accent);background:var(--accent);color:#fff}
  .leveldesc{margin-top:8px;font-size:.85rem;color:var(--muted)}

  /* progress */
  .stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 4px}
  .stat{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:10px 4px;text-align:center}
  .statn{font-size:1.25rem;font-weight:800}.statl{font-size:.72rem;color:var(--muted)}
  .ladder{display:flex;flex-direction:column;gap:6px}
  .rl{display:flex;justify-content:space-between;border:2px solid var(--border);border-radius:12px;padding:9px 12px;font-weight:700;color:var(--muted)}
  .rl.got{border-color:var(--accent);color:var(--fg);background:var(--panel)}
  .rlxp{font-size:.8rem;color:var(--muted)}
  .resetwrap{margin-top:18px;text-align:center}
  .resetconfirm{background:#fef2f2;border:2px solid #ef4444;border-radius:14px;padding:14px;font-weight:700;color:#991b1b}
  .resetconfirm>div{margin-top:10px;display:flex;gap:10px;justify-content:center}
  .danger{border:none;background:#dc2626;color:#fff;font-weight:800;border-radius:12px;padding:10px 16px;cursor:pointer}
</style>
</head>
<body>
