<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Tasks</title>
<style>
  /* ---------------------------------------------------------------------------
     Theme: prefer Standard Notes' injected StyleKit variables, fall back to a
     sensible dark/light-neutral palette so the app is also usable standalone
     (e.g. in the test harness).
  --------------------------------------------------------------------------- */
  :root {
    --bg:        var(--sn-stylekit-background-color, #1a1c1f);
    --fg:        var(--sn-stylekit-foreground-color, #e7e9ea);
    --panel:     var(--sn-stylekit-contrast-background-color, #25282c);
    --panel-2:   var(--sn-stylekit-secondary-background-color, #2e3237);
    --border:    var(--sn-stylekit-border-color, #3a3f45);
    --muted:     var(--sn-stylekit-passive-color-1, #9aa0a6);
    --muted-2:   var(--sn-stylekit-passive-color-2, #767b80);
    --accent:    var(--sn-stylekit-info-color, #2f6fed);
    --accent-fg: var(--sn-stylekit-info-contrast-color, #ffffff);
    --danger:    var(--sn-stylekit-danger-color, #e5484d);
    --success:   var(--sn-stylekit-success-color, #30a46c);
    --warning:   var(--sn-stylekit-warning-color, #f5a623);
    --radius: 8px;
    --shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  button, input, select, textarea {
    font-family: inherit; font-size: inherit; color: var(--fg);
  }
  button {
    background: transparent; border: 1px solid transparent; color: var(--fg);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; line-height: 1.2;
  }
  button:hover { background: var(--panel-2); }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.08); }
  button.ghost { border-color: var(--border); }
  button.danger { color: var(--danger); }
  button.danger:hover { background: rgba(229,72,77,0.12); }
  input[type=text], input[type=search], input[type=date], input[type=url], textarea, select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; outline: none; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  ::placeholder { color: var(--muted-2); }

  /* Toolbar -------------------------------------------------------------- */
  .toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  .toolbar .grow { flex: 1 1 auto; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .seg button { border-radius: 0; border: none; padding: 5px 12px; }
  .seg button.active { background: var(--accent); color: var(--accent-fg); }
  .search { max-width: 240px; }
  .filterbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .filterbar select { width: auto; min-width: 120px; }
  .tagfilter { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
    border-radius: 999px; font-size: 12px; border: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .chip.active { border-color: transparent; }
  .count { color: var(--muted); font-size: 12px; }

  /* Board area ----------------------------------------------------------- */
  .surface { flex: 1 1 auto; overflow: auto; padding: 12px; }

  /* Kanban */
  .kanban { display: flex; gap: 12px; align-items: flex-start; min-height: 100%; }
  .column {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    width: 290px; min-width: 290px; display: flex; flex-direction: column; max-height: 100%;
  }
  .column.dragover { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .column-head {
    display: flex; align-items: center; gap: 6px; padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .column-head .title { font-weight: 600; flex: 1 1 auto; cursor: text; }
  .column-head .num { color: var(--muted); font-size: 12px; }
  .column-body { padding: 8px; overflow-y: auto; flex: 1 1 auto; min-height: 24px; }
  .addcol { min-width: 200px; }

  /* List view */
  .list { max-width: 820px; margin: 0 auto; }
  .list-group-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin: 14px 4px 6px; font-weight: 600;
  }

  /* Task card */
  .card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 10px; margin-bottom: 8px; cursor: pointer; position: relative;
  }
  .card:hover { border-color: var(--muted-2); }
  .card.dragging { opacity: .5; }
  .card.completed .card-title { text-decoration: line-through; color: var(--muted); }
  .card-row { display: flex; align-items: flex-start; gap: 8px; }
  .checkbox {
    flex: 0 0 auto; width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--muted-2);
    margin-top: 1px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .checkbox.done { background: var(--success); border-color: var(--success); }
  .checkbox.done::after { content: "✓"; color: #fff; font-size: 12px; line-height: 1; }
  .card-title { flex: 1 1 auto; word-break: break-word; }
  .prio-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: var(--radius) 0 0 var(--radius); }
  .meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; padding-left: 26px; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px;
    padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
  }
  .badge.due-today { color: var(--warning); border-color: var(--warning); }
  .badge.due-over  { color: var(--danger); border-color: var(--danger); }
  .badge.tag { color: var(--fg); }
  .badge.sub { }
  .badge svg { width: 12px; height: 12px; }

  /* Modal ---------------------------------------------------------------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
    align-items: flex-start; justify-content: center; z-index: 50; overflow: auto; padding: 40px 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 560px; box-shadow: var(--shadow);
  }
  .modal-head { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); gap: 8px; }
  .modal-head .grow { flex: 1; }
  .modal-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .modal-foot { display: flex; justify-content: space-between; padding: 12px 14px; border-top: 1px solid var(--border); }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .field-row { display: flex; gap: 10px; }
  .field-row > .field { flex: 1; }

  .subtasks .sub-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .subtasks .sub-item input[type=text] { flex: 1; }
  .links .link-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .links .link-item input { flex: 1; }
  .inline-add { display: flex; gap: 8px; margin-top: 6px; }

  .tag-editor { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag-editor .chip .x { cursor: pointer; opacity: .7; }
  .tag-editor input { width: 120px; border: none; background: transparent; padding: 2px; }

  .empty { color: var(--muted); text-align: center; padding: 40px 12px; }
  .quickadd { display: flex; gap: 6px; margin-bottom: 8px; }
  .quickadd input { flex: 1; }
  .iconbtn { padding: 4px 6px; line-height: 1; color: var(--muted); }
  .iconbtn:hover { color: var(--fg); }
  .hidden { display: none !important; }
  .small { font-size: 12px; color: var(--muted); }
  .pill-prio { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="seg" id="viewSeg">
      <button data-view="list">List</button>
      <button data-view="kanban">Board</button>
    </div>
    <input class="search" id="search" type="search" placeholder="Search tasks…" />
    <span class="grow"></span>
    <span class="count" id="count"></span>
    <button class="ghost" id="addTaskBtn">+ Task</button>
  </div>

  <div class="filterbar">
    <select id="statusFilter" title="Status">
      <option value="all">All</option>
      <option value="active">Active</option>
      <option value="completed">Completed</option>
    </select>
    <select id="dueFilter" title="Due">
      <option value="all">Any due</option>
      <option value="overdue">Overdue</option>
      <option value="today">Due today</option>
      <option value="week">Next 7 days</option>
      <option value="none">No date</option>
    </select>
    <select id="sortBy" title="Sort (list view)">
      <option value="manual">Manual order</option>
      <option value="due">Due date</option>
      <option value="priority">Priority</option>
      <option value="created">Created</option>
      <option value="alpha">A–Z</option>
    </select>
    <div class="tagfilter" id="tagFilter"></div>
  </div>

  <div class="surface" id="surface"></div>
</div>

<!-- Task editor modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="checkbox" id="m_done" title="Toggle complete"></div>
      <input class="grow" id="m_title" type="text" placeholder="Task title" />
      <button class="iconbtn" id="m_close" title="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Due date</label>
          <input id="m_due" type="date" />
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="m_priority">
            <option value="0">None</option>
            <option value="1">Low</option>
            <option value="2">Medium</option>
            <option value="3">High</option>
          </select>
        </div>
        <div class="field">
          <label>List / Column</label>
          <select id="m_column"></select>
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="m_notes" placeholder="Details, context, anything…"></textarea>
      </div>
      <div class="field">
        <label>Tags</label>
        <div class="tag-editor" id="m_tags"></div>
      </div>
      <div class="field subtasks">
        <label>Subtasks</label>
        <div id="m_subtasks"></div>
        <div class="inline-add">
          <input id="m_subInput" type="text" placeholder="Add a subtask and press Enter" />
        </div>
      </div>
      <div class="field links">
        <label>Links</label>
        <div id="m_links"></div>
        <div class="inline-add">
          <input id="m_linkLabel" type="text" placeholder="Label (optional)" style="flex:0 0 160px" />
          <input id="m_linkUrl" type="url" placeholder="https://…" />
          <button class="ghost" id="m_addLink">Add</button>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger" id="m_delete">Delete task</button>
      <span class="small" id="m_meta"></span>
    </div>
  </div>
</div>

<script>
"use strict";
/* ===========================================================================
   PART 1 — Standard Notes component bridge (vanilla port of the documented
   component-relay protocol). No build step, no dependencies.
   Protocol reference: standardnotes component messaging
   (stream-context-item / save-items / component-registered / themes).
   =========================================================================== */
const SNBridge = (function () {
  const Action = {
    StreamContextItem: 'stream-context-item',
    SaveItems: 'save-items',
    ComponentRegistered: 'component-registered',
    ActivateThemes: 'themes',
    ThemesActivated: 'themes-activated',
    SetComponentData: 'set-component-data',
  };
  const API_COMPONENT = 'component';

  let sessionKey = null;
  let environment = null;
  let platform = null;
  let componentData = {};
  let lastItem = null;            // current NoteContainer
  const sentMessages = [];        // awaiting replies (messageId -> callback)
  const queue = [];               // messages sent before registration
  let activeThemes = [];
  let onNote = null;              // callback(noteText, meta)
  let saveTimer = null;
  let saveDelay = 250;
  let standalone = false;         // true when not embedded in SN (test harness / direct open)

  function uuid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function isMobile() { return environment === 'mobile'; }

  function post(action, data, callback) {
    if (!sessionKey) { queue.push({ action, data, callback }); return; }
    const message = { action, data, messageId: uuid(), sessionKey, api: API_COMPONENT };
    const stored = JSON.parse(JSON.stringify(message));
    stored.callback = callback;
    sentMessages.push(stored);
    window.parent.postMessage(isMobile() ? JSON.stringify(message) : message, '*');
  }

  function handle(payload) {
    if (!payload || !payload.action) return;
    if (payload.action === Action.ComponentRegistered) {
      sessionKey = payload.sessionKey;
      if (payload.componentData) componentData = payload.componentData;
      const d = payload.data || {};
      environment = d.environment; platform = d.platform;
      // flush queue
      const pending = queue.splice(0, queue.length);
      pending.forEach(m => post(m.action, m.data, m.callback));
      activateThemes(d.activeThemeUrls || []);
      post(Action.ThemesActivated, {});
      // begin streaming the open note
      post(Action.StreamContextItem, {}, onStreamed);
      return;
    }
    if (payload.action === Action.ActivateThemes) {
      activateThemes((payload.data && payload.data.themes) || []);
      return;
    }
    // reply routing
    if (!payload.original) return;
    const idx = sentMessages.findIndex(m => m.messageId === payload.original.messageId);
    if (idx === -1) return;
    const original = sentMessages[idx];
    if (original.callback) original.callback(payload.data);
  }

  function onStreamed(data) {
    const item = data && data.item;
    if (!item) return;
    lastItem = item;
    if (item.isMetadataUpdate) return;   // skip pure metadata pings
    if (onNote) onNote(text(), meta());
  }

  function text() {
    return (lastItem && lastItem.content && lastItem.content.text) || '';
  }
  function meta() {
    if (lastItem && lastItem.content) {
      const id = lastItem.content.editorIdentifier;
      const app = lastItem.content.appData || {};
      return (id && app[id]) || {};
    }
    return {};
  }

  function save(newText, previewText) {
    if (standalone) { return; } // nothing to save to when opened directly
    if (!lastItem) return;
    lastItem.content.text = newText;
    if (typeof previewText === 'string') lastItem.content.preview_plain = previewText;
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(flush, saveDelay);
  }
  function flush() {
    if (!lastItem) return;
    const copy = Object.assign({}, lastItem);
    copy.children = null; copy.parent = null;
    post(Action.SaveItems, { items: [copy] });
  }

  function activateThemes(urls) {
    if (activeThemes.sort().toString() === urls.slice().sort().toString()) return;
    // remove old
    Array.from(document.getElementsByClassName('sn-theme')).forEach(el => el.remove());
    urls.forEach(url => {
      if (!url) return;
      const link = document.createElement('link');
      link.className = 'sn-theme'; link.rel = 'stylesheet'; link.type = 'text/css'; link.href = url;
      document.head.appendChild(link);
    });
    activeThemes = urls;
  }

  function listen() {
    const onMsg = (event) => {
      let data = event.data;
      if (typeof data === 'string') { try { data = JSON.parse(data); } catch (e) { return; } }
      handle(data);
    };
    window.addEventListener('message', onMsg, false);
    document.addEventListener('message', onMsg, false); // RN/mobile
  }

  return {
    init(opts) {
      opts = opts || {};
      saveDelay = typeof opts.debounceSave === 'number' ? opts.debounceSave : 250;
      onNote = opts.onNote || null;
      listen();
      // If we are not inside an SN iframe, no registration will arrive.
      // Detect after a short grace period and run standalone with localStorage.
      setTimeout(() => {
        if (!sessionKey) {
          standalone = true;
          if (opts.onStandalone) opts.onStandalone();
        }
      }, 600);
    },
    save,
    flushNow: flush,
    isStandalone() { return standalone; },
    env() { return environment; },
  };
})();

/* ===========================================================================
   PART 2 — Task manager application.
   Data lives as a JSON string inside the note's text (one board per note).
   =========================================================================== */
const App = (function () {
  const SCHEMA = 2;
  const TAG_COLORS = ['#2f6fed','#30a46c','#f5a623','#e5484d','#8e4ec6','#0aa5b8','#d6409f','#a18072'];
  const PRIO = { 0:{label:'None',color:'transparent'}, 1:{label:'Low',color:'#0aa5b8'},
                 2:{label:'Medium',color:'#f5a623'}, 3:{label:'High',color:'#e5484d'} };

  let data = null;        // { schema, columns:[{id,name}], tasks:{id:task}, order:{colId:[taskId]}, tags:{name:color}, ui:{view} }
  let dirty = false;
  let editingId = null;   // task currently open in modal
  let standalone = false;

  const filters = { search:'', status:'all', due:'all', sort:'manual', tags:new Set() };

  /* ---- persistence ---- */
  function defaultData() {
    const c1 = id(), c2 = id(), c3 = id();
    return {
      schema: SCHEMA,
      columns: [ {id:c1,name:'To Do'}, {id:c2,name:'In Progress'}, {id:c3,name:'Done'} ],
      tasks: {},
      order: { [c1]:[], [c2]:[], [c3]:[] },
      tags: {},
      ui: { view: 'list' }
    };
  }
  function id() { return (window.crypto && crypto.randomUUID) ? crypto.randomUUID().slice(0,8) : Math.random().toString(36).slice(2,10); }

  function load(text) {
    let parsed = null;
    if (text && text.trim()) { try { parsed = JSON.parse(text); } catch (e) { parsed = null; } }
    if (!parsed || !parsed.columns) { data = defaultData(); }
    else { data = migrate(parsed); }
    // restore standalone state
    if (standalone) {
      try {
        const saved = localStorage.getItem('sn-tasks-standalone');
        if (saved) data = migrate(JSON.parse(saved));
      } catch (e) {}
    }
    sanitize();
    render();
  }
  function migrate(d) {
    d.schema = d.schema || 1;
    d.tasks = d.tasks || {};
    d.order = d.order || {};
    d.tags = d.tags || {};
    d.ui = d.ui || { view:'list' };
    if (!d.columns || !d.columns.length) d.columns = defaultData().columns;
    return d;
  }
  function sanitize() {
    // ensure every column has an order array and every task is referenced exactly once
    const seen = new Set();
    data.columns.forEach(c => {
      if (!Array.isArray(data.order[c.id])) data.order[c.id] = [];
      data.order[c.id] = data.order[c.id].filter(tid => {
        if (data.tasks[tid] && !seen.has(tid)) { seen.add(tid); return true; }
        return false;
      });
    });
    // orphan tasks -> first column
    Object.keys(data.tasks).forEach(tid => {
      if (!seen.has(tid)) { data.order[data.columns[0].id].push(tid); seen.add(tid); }
    });
  }

  function persist() {
    dirty = true;
    const text = JSON.stringify(data);
    if (standalone) { try { localStorage.setItem('sn-tasks-standalone', text); } catch (e) {} return; }
    SNBridge.save(text, previewText());
  }
  function previewText() {
    const all = Object.values(data.tasks);
    const open = all.filter(t => !t.done).length;
    const next = all.filter(t => !t.done && t.due).sort((a,b)=>a.due.localeCompare(b.due))[0];
    let s = open + ' open task' + (open===1?'':'s') + ' · ' + all.length + ' total';
    if (next) s += ' · next due ' + next.due;
    return s;
  }

  /* ---- task helpers ---- */
  function newTask(title, columnId) {
    const t = {
      id: id(), title: (title||'').trim(), notes:'', due:null, priority:0,
      tags:[], links:[], subtasks:[], done:false,
      createdAt: new Date().toISOString(), completedAt:null
    };
    data.tasks[t.id] = t;
    columnId = columnId || data.columns[0].id;
    (data.order[columnId] = data.order[columnId] || []).push(t.id);
    return t;
  }
  function columnOf(taskId) {
    for (const c of data.columns) if ((data.order[c.id]||[]).includes(taskId)) return c.id;
    return null;
  }
  function moveTask(taskId, toCol, toIndex) {
    const from = columnOf(taskId);
    if (from) data.order[from] = data.order[from].filter(t => t !== taskId);
    const arr = data.order[toCol] = data.order[toCol] || [];
    if (typeof toIndex !== 'number' || toIndex < 0 || toIndex > arr.length) toIndex = arr.length;
    arr.splice(toIndex, 0, taskId);
  }
  function deleteTask(taskId) {
    const c = columnOf(taskId);
    if (c) data.order[c] = data.order[c].filter(t => t !== taskId);
    delete data.tasks[taskId];
  }
  function toggleDone(t) {
    t.done = !t.done;
    t.completedAt = t.done ? new Date().toISOString() : null;
  }
  function ensureTagColor(name) {
    if (!data.tags[name]) {
      const used = Object.keys(data.tags).length;
      data.tags[name] = TAG_COLORS[used % TAG_COLORS.length];
    }
    return data.tags[name];
  }
  function allTags() { return Array.from(new Set(Object.values(data.tasks).flatMap(t => t.tags))).sort(); }

  /* ---- date helpers ---- */
  function todayStr() {
    const d = new Date(); d.setHours(0,0,0,0);
    return toISODate(d);
  }
  function toISODate(d) {
    const z = new Date(d.getTime() - d.getTimezoneOffset()*60000);
    return z.toISOString().slice(0,10);
  }
  function dueState(due) {
    if (!due) return '';
    const t = todayStr();
    if (due < t) return 'over';
    if (due === t) return 'today';
    return 'future';
  }
  function fmtDue(due) {
    const t = todayStr();
    if (due === t) return 'Today';
    const d = new Date(due+'T00:00:00');
    const now = new Date(t+'T00:00:00');
    const diff = Math.round((d - now)/86400000);
    if (diff === 1) return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  /* ---- filtering / sorting ---- */
  function matchesFilters(t) {
    if (filters.status === 'active' && t.done) return false;
    if (filters.status === 'completed' && !t.done) return false;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const hay = (t.title + ' ' + t.notes + ' ' + t.tags.join(' ') + ' ' +
                   t.subtasks.map(s=>s.title).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (filters.tags.size) { if (!t.tags.some(tag => filters.tags.has(tag))) return false; }
    if (filters.due !== 'all') {
      const st = dueState(t.due);
      if (filters.due === 'none' && t.due) return false;
      if (filters.due === 'overdue' && st !== 'over') return false;
      if (filters.due === 'today' && st !== 'today') return false;
      if (filters.due === 'week') {
        if (!t.due) return false;
        const diff = (new Date(t.due) - new Date(todayStr()))/86400000;
        if (diff < 0 || diff > 7) return false;
      }
    }
    return true;
  }
  function sortTasks(tasks) {
    const s = filters.sort;
    const arr = tasks.slice();
    if (s === 'due') arr.sort((a,b)=> (a.due||'9999').localeCompare(b.due||'9999'));
    else if (s === 'priority') arr.sort((a,b)=> b.priority - a.priority);
    else if (s === 'created') arr.sort((a,b)=> (a.createdAt||'').localeCompare(b.createdAt||''));
    else if (s === 'alpha') arr.sort((a,b)=> a.title.localeCompare(b.title));
    return arr;
  }

  /* =======================  RENDERING  ======================= */
  const $ = s => document.querySelector(s);
  const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };

  function render() {
    if (!data) return;
    // toolbar state
    document.querySelectorAll('#viewSeg button').forEach(b =>
      b.classList.toggle('active', b.dataset.view === data.ui.view));
    renderTagFilter();
    const visible = Object.values(data.tasks).filter(matchesFilters).length;
    const total = Object.keys(data.tasks).length;
    $('#count').textContent = visible + (visible===total ? '' : ' / ' + total) + ' shown';

    const surface = $('#surface');
    surface.innerHTML = '';
    if (data.ui.view === 'kanban') surface.appendChild(renderKanban());
    else surface.appendChild(renderList());
  }

  function renderTagFilter() {
    const wrap = $('#tagFilter'); wrap.innerHTML = '';
    const tags = allTags();
    tags.forEach(tag => {
      const c = ensureTagColor(tag);
      const chip = el('span', 'chip' + (filters.tags.has(tag) ? ' active' : ''),
        '<span style="width:8px;height:8px;border-radius:50%;background:'+c+';display:inline-block"></span>' + escapeHtml(tag));
      if (filters.tags.has(tag)) { chip.style.background = c; chip.style.color = '#fff'; }
      chip.onclick = () => { filters.tags.has(tag) ? filters.tags.delete(tag) : filters.tags.add(tag); render(); };
      wrap.appendChild(chip);
    });
  }

  /* ---- Kanban ---- */
  function renderKanban() {
    const board = el('div', 'kanban');
    data.columns.forEach(col => board.appendChild(renderColumn(col)));
    // add-column control
    const add = el('div', 'column addcol');
    const head = el('div', 'column-head');
    const btn = el('button', 'ghost', '+ Add list');
    btn.style.width = '100%';
    btn.onclick = () => {
      const name = prompt('New list name:', 'New List');
      if (name && name.trim()) { const c={id:id(),name:name.trim()}; data.columns.push(c); data.order[c.id]=[]; persist(); render(); }
    };
    head.appendChild(btn); add.appendChild(head);
    board.appendChild(add);
    return board;
  }
  function renderColumn(col) {
    const wrap = el('div', 'column'); wrap.dataset.col = col.id;
    const head = el('div', 'column-head');
    const title = el('div', 'title'); title.textContent = col.name; title.title = 'Click to rename';
    title.onclick = () => {
      const name = prompt('Rename list:', col.name);
      if (name && name.trim()) { col.name = name.trim(); persist(); render(); }
    };
    const ids = (data.order[col.id]||[]).filter(tid => data.tasks[tid] && matchesFilters(data.tasks[tid]));
    const num = el('span', 'num', String(ids.length));
    const del = el('button', 'iconbtn', '⋯');
    del.title = 'List options';
    del.onclick = (e) => {
      e.stopPropagation();
      if (data.columns.length <= 1) { alert('Keep at least one list.'); return; }
      if (confirm('Delete list "'+col.name+'"? Tasks in it move to "'+data.columns[0].name+'".')) {
        const moved = data.order[col.id] || [];
        if (data.columns[0].id !== col.id) data.order[data.columns[0].id].push(...moved);
        delete data.order[col.id];
        data.columns = data.columns.filter(c => c.id !== col.id);
        persist(); render();
      }
    };
    head.appendChild(title); head.appendChild(num); head.appendChild(del);
    wrap.appendChild(head);

    const body = el('div', 'column-body'); body.dataset.col = col.id;
    // quick add
    const qa = el('div', 'quickadd');
    const qi = el('input'); qi.type = 'text'; qi.placeholder = '+ Add task';
    qi.onkeydown = (e) => { if (e.key === 'Enter' && qi.value.trim()) { newTask(qi.value, col.id); persist(); qi.value=''; render(); } };
    qa.appendChild(qi); body.appendChild(qa);

    ids.forEach((tid, index) => body.appendChild(renderCard(data.tasks[tid], col.id, index)));

    // drag & drop onto column
    body.addEventListener('dragover', (e) => { e.preventDefault(); wrap.classList.add('dragover'); });
    body.addEventListener('dragleave', () => wrap.classList.remove('dragover'));
    body.addEventListener('drop', (e) => {
      e.preventDefault(); wrap.classList.remove('dragover');
      const tid = e.dataTransfer.getData('text/task');
      if (!tid) return;
      const after = [...body.querySelectorAll('.card')].find(c => {
        const r = c.getBoundingClientRect(); return e.clientY < r.top + r.height/2;
      });
      let toIndex = data.order[col.id].length;
      if (after) toIndex = data.order[col.id].indexOf(after.dataset.id);
      moveTask(tid, col.id, toIndex);
      persist(); render();
    });
    wrap.appendChild(body);
    return wrap;
  }

  /* ---- List ---- */
  function renderList() {
    const wrap = el('div', 'list');
    const all = Object.values(data.tasks).filter(matchesFilters);
    if (!all.length) { wrap.appendChild(el('div','empty', emptyMsg())); return wrap; }

    if (filters.sort === 'manual') {
      // group by column in board order
      data.columns.forEach(col => {
        const ids = (data.order[col.id]||[]).filter(tid => data.tasks[tid] && matchesFilters(data.tasks[tid]));
        if (!ids.length) return;
        wrap.appendChild(el('div','list-group-title', escapeHtml(col.name) + ' · ' + ids.length));
        ids.forEach((tid, i) => wrap.appendChild(renderCard(data.tasks[tid], col.id, i)));
      });
    } else {
      sortTasks(all).forEach(t => wrap.appendChild(renderCard(t, columnOf(t.id), 0)));
    }
    return wrap;
  }
  function emptyMsg() {
    if (Object.keys(data.tasks).length === 0) return 'No tasks yet. Use “+ Task” or the quick-add box to begin.';
    return 'No tasks match the current filters.';
  }

  /* ---- Card ---- */
  function renderCard(t, colId, index) {
    const card = el('div', 'card' + (t.done ? ' completed' : ''));
    card.dataset.id = t.id;
    card.draggable = true;
    card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/task', t.id); card.classList.add('dragging'); });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));

    if (t.priority > 0) {
      const bar = el('div', 'prio-bar'); bar.style.background = PRIO[t.priority].color; card.appendChild(bar);
    }
    const row = el('div', 'card-row');
    const cb = el('div', 'checkbox' + (t.done ? ' done' : ''));
    cb.onclick = (e) => { e.stopPropagation(); toggleDone(t); persist(); render(); };
    const title = el('div', 'card-title'); title.textContent = t.title || '(untitled)';
    row.appendChild(cb); row.appendChild(title);
    card.appendChild(row);

    const badges = [];
    if (t.due) {
      const st = dueState(t.due);
      const cls = st === 'over' ? 'badge due-over' : st === 'today' ? 'badge due-today' : 'badge';
      badges.push('<span class="'+cls+'">'+ icon('calendar') + escapeHtml(fmtDue(t.due)) +'</span>');
    }
    if (t.priority > 0) badges.push('<span class="badge">'+ PRIO[t.priority].label +'</span>');
    if (t.subtasks.length) {
      const done = t.subtasks.filter(s=>s.done).length;
      badges.push('<span class="badge sub">'+ icon('check') + done+'/'+t.subtasks.length +'</span>');
    }
    if (t.links.length) badges.push('<span class="badge">'+ icon('link') + t.links.length +'</span>');
    if (t.notes && t.notes.trim()) badges.push('<span class="badge">'+ icon('note') +'</span>');
    t.tags.forEach(tag => {
      const c = ensureTagColor(tag);
      badges.push('<span class="badge tag" style="border-color:'+c+'"><span style="width:7px;height:7px;border-radius:50%;background:'+c+';display:inline-block"></span>'+ escapeHtml(tag) +'</span>');
    });
    if (badges.length) { const mr = el('div','meta-row', badges.join('')); card.appendChild(mr); }

    card.addEventListener('click', () => openModal(t.id));
    return card;
  }

  function icon(name) {
    const map = {
      calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
      check:'<path d="M20 6 9 17l-5-5"/>',
      link:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',
      note:'<path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/>'
    };
    return '<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(map[name]||'')+'</svg>';
  }

  /* =======================  MODAL  ======================= */
  function openModal(taskId) {
    editingId = taskId;
    const t = data.tasks[taskId];
    if (!t) return;
    $('#m_title').value = t.title;
    $('#m_done').className = 'checkbox' + (t.done ? ' done' : '');
    $('#m_due').value = t.due || '';
    $('#m_priority').value = String(t.priority);
    $('#m_notes').value = t.notes || '';
    // columns dropdown
    const sel = $('#m_column'); sel.innerHTML = '';
    data.columns.forEach(c => { const o = el('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });
    sel.value = columnOf(taskId) || data.columns[0].id;
    renderModalTags(t); renderModalSubtasks(t); renderModalLinks(t);
    const created = t.createdAt ? new Date(t.createdAt).toLocaleDateString() : '';
    $('#m_meta').textContent = created ? 'Created ' + created : '';
    $('#overlay').classList.add('open');
    $('#m_title').focus();
  }
  function closeModal() { commitModal(); editingId = null; $('#overlay').classList.remove('open'); render(); }
  function commitModal() {
    if (!editingId) return;
    const t = data.tasks[editingId]; if (!t) return;
    t.title = $('#m_title').value.trim();
    t.due = $('#m_due').value || null;
    t.priority = parseInt($('#m_priority').value, 10) || 0;
    t.notes = $('#m_notes').value;
    const newCol = $('#m_column').value;
    if (newCol && newCol !== columnOf(editingId)) moveTask(editingId, newCol);
    persist();
  }

  function renderModalTags(t) {
    const box = $('#m_tags'); box.innerHTML = '';
    t.tags.forEach(tag => {
      const c = ensureTagColor(tag);
      const chip = el('span','chip','<span style="width:8px;height:8px;border-radius:50%;background:'+c+';display:inline-block"></span>'+escapeHtml(tag)+' <span class="x">✕</span>');
      chip.querySelector('.x').onclick = () => { t.tags = t.tags.filter(x=>x!==tag); persist(); renderModalTags(t); };
      box.appendChild(chip);
    });
    const input = el('input'); input.type='text'; input.placeholder='add tag…';
    input.setAttribute('list','tag-suggest');
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const v = input.value.trim();
        if (!t.tags.includes(v)) { t.tags.push(v); ensureTagColor(v); }
        input.value=''; persist(); renderModalTags(t);
      }
    };
    box.appendChild(input);
    // datalist of existing tags
    let dl = document.getElementById('tag-suggest');
    if (!dl) { dl = el('datalist'); dl.id='tag-suggest'; document.body.appendChild(dl); }
    dl.innerHTML = allTags().map(x=>'<option value="'+escapeAttr(x)+'">').join('');
  }
  function renderModalSubtasks(t) {
    const box = $('#m_subtasks'); box.innerHTML = '';
    t.subtasks.forEach((s, i) => {
      const row = el('div','sub-item');
      const cb = el('div','checkbox'+(s.done?' done':'')); cb.onclick = () => { s.done=!s.done; persist(); render(); };
      const inp = el('input'); inp.type='text'; inp.value=s.title;
      inp.oninput = () => { s.title = inp.value; persist(); };
      const x = el('button','iconbtn','✕'); x.onclick = () => { t.subtasks.splice(i,1); persist(); renderModalSubtasks(t); render(); };
      row.appendChild(cb); row.appendChild(inp); row.appendChild(x);
      box.appendChild(row);
    });
  }
  function renderModalLinks(t) {
    const box = $('#m_links'); box.innerHTML = '';
    t.links.forEach((l, i) => {
      const row = el('div','link-item');
      const a = el('a'); a.href = l.url; a.target='_blank'; a.rel='noopener noreferrer';
      a.textContent = l.label || l.url; a.style.flex='1'; a.style.color='var(--accent)'; a.style.wordBreak='break-all';
      const x = el('button','iconbtn','✕'); x.onclick = () => { t.links.splice(i,1); persist(); renderModalLinks(t); render(); };
      row.appendChild(a); row.appendChild(x);
      box.appendChild(row);
    });
  }

  /* =======================  WIRING  ======================= */
  function wire() {
    // view toggle
    document.querySelectorAll('#viewSeg button').forEach(b => {
      b.onclick = () => { data.ui.view = b.dataset.view; persist(); render(); };
    });
    $('#search').oninput = (e) => { filters.search = e.target.value; render(); };
    $('#statusFilter').onchange = (e) => { filters.status = e.target.value; render(); };
    $('#dueFilter').onchange = (e) => { filters.due = e.target.value; render(); };
    $('#sortBy').onchange = (e) => { filters.sort = e.target.value; render(); };
    $('#addTaskBtn').onclick = () => {
      const t = newTask('', data.columns[0].id); persist(); render(); openModal(t.id);
    };
    // modal
    $('#m_close').onclick = closeModal;
    $('#overlay').addEventListener('mousedown', (e) => { if (e.target.id === 'overlay') closeModal(); });
    $('#m_done').onclick = () => { const t = data.tasks[editingId]; if (t){ toggleDone(t); $('#m_done').className='checkbox'+(t.done?' done':''); persist(); } };
    $('#m_title').onkeydown = (e) => { if (e.key === 'Enter') closeModal(); };
    ['m_due','m_priority','m_notes','m_column'].forEach(idn => { const e=document.getElementById(idn); e.onchange = commitModal; });
    $('#m_subInput').onkeydown = (e) => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        const t = data.tasks[editingId];
        t.subtasks.push({ id:id(), title:e.target.value.trim(), done:false });
        e.target.value=''; persist(); renderModalSubtasks(t);
      }
    };
    $('#m_addLink').onclick = () => {
      const t = data.tasks[editingId];
      const url = $('#m_linkUrl').value.trim(); if (!url) return;
      let u = url; if (!/^https?:\/\//i.test(u) && !/^mailto:/i.test(u)) u = 'https://' + u;
      t.links.push({ label: $('#m_linkLabel').value.trim(), url: u });
      $('#m_linkLabel').value=''; $('#m_linkUrl').value=''; persist(); renderModalLinks(t);
    };
    $('#m_delete').onclick = () => {
      if (!editingId) return;
      if (confirm('Delete this task?')) { deleteTask(editingId); editingId=null; $('#overlay').classList.remove('open'); persist(); render(); }
    };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('#overlay').classList.contains('open')) closeModal(); });
    // flush on unload
    window.addEventListener('beforeunload', () => { if (dirty) SNBridge.flushNow(); });
  }

  /* ---- utils ---- */
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHtml(s); }

  return {
    start() {
      wire();
      SNBridge.init({
        debounceSave: 250,
        onNote: (text) => { standalone = false; load(text); },
        onStandalone: () => { standalone = true; load(''); }
      });
    }
  };
})();

document.addEventListener('DOMContentLoaded', App.start);
</script>
</body>
